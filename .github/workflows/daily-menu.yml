name: daily-menu
on:
  schedule:
    - cron: "18 0 * * 1-5"   # 매일 KST 09:18 (UTC 00:28), 월~금
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: node send-menu.js
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
